trigger:
  branches:
    include:
      - DEV
      - Main

pool:
  vmImage: ubuntu-latest

variables:
  - group: Fabric-UAT-CICD-Vars
  - group: Fabric-workspace-ids
  - name: PYTHON_VERSION
    value: '3.12'

stages:

# ================= DEV =================
- stage: DEV
  displayName: Deploy to DEV
  jobs:
    - job: DeployDev
      steps:

        - checkout: self
          fetchDepth: 0

        - task: UsePythonVersion@0
          inputs:
            versionSpec: $(PYTHON_VERSION)

        - script: |
            pip install azure-identity requests
          displayName: Install dependencies

        - script: |
            python deploy.py
          displayName: Deploy DEV
          env:
            ENVIRONMENT: dev
            WORKSPACE_ID: $(FABRIC_WORKSPACE_ID_DEV)
            CLIENT_ID: $(FABRIC_CLIENT_ID)
            CLIENT_SECRET: $(FABRIC_CLIENT_SECRET)
            TENANT_ID: $(FABRIC_TENANT_ID)

        - task: PublishPipelineArtifact@1
          displayName: Publish change list for downstream stages
          inputs:
            targetPath: changed_files.json
            artifact: changed-files

# ================= UAT =================
- stage: UAT
  displayName: Deploy to UAT
  dependsOn: DEV

  jobs:
  - job: DeployUAT

    steps:
    - checkout: self
      fetchDepth: 0

    - task: DownloadPipelineArtifact@2
      displayName: Download change list from DEV
      inputs:
        artifact: changed-files
        path: $(Pipeline.Workspace)/changed-files

    - task: UsePythonVersion@0
      inputs:
        versionSpec: $(PYTHON_VERSION)

    - script: |
        cp "$(Pipeline.Workspace)/changed-files/changed_files.json" .
      displayName: Copy change list to working directory

    - script: |
        pip install azure-identity requests
      displayName: Install dependencies

    - script: |
        python deploy.py
      displayName: Deploy UAT
      env:
        ENVIRONMENT: uat
        WORKSPACE_ID: $(FABRIC_WORKSPACE_ID_UAT)
        CLIENT_ID: $(FABRIC_CLIENT_ID)
        CLIENT_SECRET: $(FABRIC_CLIENT_SECRET)
        TENANT_ID: $(FABRIC_TENANT_ID)

    - task: PublishPipelineArtifact@1
      displayName: Publish change list for downstream stages
      inputs:
        targetPath: changed_files.json
        artifact: changed-files

# ================= PROD =================
- stage: PROD
  displayName: Deploy to PROD
  dependsOn: UAT

  jobs:
    - deployment: DeployProd
      environment: PROD
      strategy:
        runOnce:
          deploy:
            steps:

              - checkout: self
                fetchDepth: 0

              - task: DownloadPipelineArtifact@2
                displayName: Download change list from UAT
                inputs:
                  artifact: changed-files
                  path: $(Pipeline.Workspace)/changed-files

              - script: |
                  cp "$(Pipeline.Workspace)/changed-files/changed_files.json" .
                displayName: Copy change list to working directory

              - task: UsePythonVersion@0
                inputs:
                  versionSpec: $(PYTHON_VERSION)

              - script: |
                  pip install azure-identity requests
                displayName: Install dependencies

              - script: |
                  python deploy.py
                displayName: Deploy PROD
                env:
                  ENVIRONMENT: prod
                  WORKSPACE_ID: $(FABRIC_WORKSPACE_ID_PROD)
                  CLIENT_ID: $(FABRIC_CLIENT_ID)
                  CLIENT_SECRET: $(FABRIC_CLIENT_SECRET)
                  TENANT_ID: $(FABRIC_TENANT_ID)
